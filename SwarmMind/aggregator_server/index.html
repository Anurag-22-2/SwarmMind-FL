<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwarmMind - Local AI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            background-color: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #333;
        }
        .header {
            background-color: #2c2c2c;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid #444;
        }
        .header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: #4CAF50;
        }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 8px;
            line-height: 1.4;
        }
        .user-msg {
            background-color: #4CAF50;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .ai-msg {
            background-color: #333;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        .input-area {
            display: flex;
            padding: 15px;
            background-color: #2c2c2c;
            border-top: 1px solid #444;
        }
        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background-color: #121212;
            color: white;
            outline: none;
        }
        button {
            padding: 10px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h2>SwarmMind Edge Node</h2>
    </div>
    <div class="chat-box" id="chatBox">
        <div class="message ai-msg">System initialized. Waiting for local input...</div>
    </div>
    <div class="input-area">
        <input type="text" id="promptInput" placeholder="Type your prompt here..." onkeypress="handleKeyPress(event)">
        <button onclick="sendPrompt()">Send</button>
    </div>
</div>

<script>
    async function sendPrompt() {
        const inputElement = document.getElementById('promptInput');
        const chatBox = document.getElementById('chatBox');
        const userText = inputElement.value.trim();

        if (!userText) return;

        // 1. Show User Message
        const userDiv = document.createElement('div');
        userDiv.className = 'message user-msg';
        userDiv.innerText = userText;
        chatBox.appendChild(userDiv);
        inputElement.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        // 2. Show Loading state for AI
        const aiDiv = document.createElement('div');
        aiDiv.className = 'message ai-msg';
        aiDiv.innerText = 'Processing on local GPU...';
        chatBox.appendChild(aiDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // 3. Call your Node.js server (Make sure port matches your server.js, usually 3000)
            const response = await fetch('http://localhost:3000/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: userText })
            });

            const data = await response.json();
            
            // 4. Update AI Message with actual response
            aiDiv.innerText = data.response || "No response received.";
        } catch (error) {
            console.error('Error:', error);
            aiDiv.innerText = "Error: Could not connect to local server.";
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendPrompt();
        }
    }
</script>

</body>
</html>
